# Reverse-proxy nginx qui équilibre la charge vers les réplicas du service "api".
#
# Astuce clé : avec plusieurs réplicas, Docker Compose enregistre le nom de
# service "api" dans le DNS interne (127.0.0.11) avec UNE entrée par réplica.
# On force donc nginx à interroger ce resolver à l'exécution (via une variable
# dans proxy_pass) : à chaque réseau résolu, le DNS Docker fait tourner la liste
# des conteneurs -> les requêtes sont réparties sur les 4 réplicas.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format lb '$remote_addr -> $upstream_addr "$request" $status';

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://api:2456;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}