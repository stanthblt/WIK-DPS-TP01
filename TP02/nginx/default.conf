# Reverse-proxy nginx devant l'API Flask.
# nginx est exposé sur le port 80 ; il relaie le trafic vers le service "api"
# (résolu via le DNS interne de Docker Compose sur le réseau "frontend").
upstream api_backend {
    server api:2456;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
